<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ishant Dhiman - 3D Interactive Portfolio Hub</title>
    
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    
    <!-- React and ReactDOM production builds -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for on-the-fly JSX compilation in browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @keyframes subtle-pulse {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.05); }
        }
        @keyframes grid-move {
            0% { background-position: 0 0; }
            100% { background-position: 40px 40px; }
        }
        @keyframes text-shine {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .neon-pulse-glow {
            filter: blur(120px);
            animation: subtle-pulse 8s ease-in-out infinite;
        }
        .custom-grid-overlay {
            background-size: 30px 30px;
            background-image: 
                linear-gradient(to right, rgba(255, 255, 255, 0.012) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(255, 255, 255, 0.012) 1px, transparent 1px);
            animation: grid-move 25s linear infinite;
        }
        .ultra-smooth-motion {
            transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .text-gradient-shimmer {
            background: linear-gradient(to right, #a78bfa, #f472b6, #34d399, #a78bfa);
            background-size: 300% auto;
            animation: text-shine 6s ease infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        @media print {
            body { background: #ffffff !important; color: #000000 !important; }
            .no-print { display: none !important; }
            .print-page {
                display: block !important;
                background: #ffffff !important;
                color: #000000 !important;
                padding: 0 !important;
                margin: 0 !important;
                box-shadow: none !important;
                border: none !important;
            }
        }
    </style>
</head>
<body class="bg-[#030304] text-zinc-100 font-sans antialiased overflow-x-hidden relative custom-grid-overlay">

    <div id="root"></div>

    <script type="text/babel">
        // Lucide Icons Helper Wrapper
        const Icon = ({ name, className = "w-4 h-4" }) => {
            React.useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [name]);
            return <i data-lucide={name} class={className}></i>;
        };

        const RESUME_DATA = {
            name: 'ISHANT DHIMAN',
            title: 'Web Designer & Data Analyst',
            subTitle: 'Digital Marketing Specialist',
            contact: {
                location: 'Kalka, Panchkula, Haryana, India',
                phone: '9518257328',
                email: 'ishantdhiman115@gmail.com'
            },
            summary: 'Self-driven Web Designer, Data Analyst & Digital Marketing Professional with hands-on experience in website design, responsive development, SEO, AI productivity tools, business research and data analysis. Strong analytical, problem-solving and communication skills.',
            skills: [
                { name: 'Website Design', category: 'Creative Tech', level: 94 },
                { name: 'Responsive Design', category: 'Creative Tech', level: 96 },
                { name: 'HTML / CSS', category: 'Creative Tech', level: 92 },
                { name: 'SEO Optimization', category: 'Digital Marketing', level: 89 },
                { name: 'Microsoft Excel', category: 'Data Analytics', level: 95 },
                { name: 'Google Sheets', category: 'Data Analytics', level: 93 },
                { name: 'AI Productivity Tools', category: 'Data Analytics', level: 97 },
                { name: 'Data Analysis', category: 'Data Analytics', level: 91 }
            ],
            education: [
                { degree: 'Bachelor of Computer Applications (BCA)', institution: 'Maharaja Agrasen University', timeline: 'Completed 2026' },
                { degree: 'Class 12 (HP Board)', institution: 'NPSSS School', timeline: 'Completed 2023' }
            ],
            projects: [
                { title: 'Responsive Web Engineering Projects', type: 'Creative Design & Engineering', timeline: '2024 - Present', points: ['Designed and optimized several interactive mockups.', 'Structured search engine schemas (SEO) to score perfect 100 ratings.'] },
                { title: 'Data & Market Analytics Frameworks', type: 'Data & Business Intelligence', timeline: '2025 - 2026', points: ['Engineered advanced data models using complex pivot tables.', 'Automated document pipelines using AI prompt architectures.'] }
            ],
            strengths: ['Ultra-Adaptable System Thinker', 'Self-Motivated Learner', 'Positive Corporate Ethic', 'Rapid Knowledge Ingestion']
        };

        // Simulated High-Fidelity Interactive 3D Workstation Fallback using HTML5 Canvas
        function Workspace3DScene({ zoomActive }) {
            const canvasRef = React.useRef(null);

            React.useEffect(() => {
                const canvas = canvasRef.current;
                if (!canvas) return;
                const ctx = canvas.getContext('2d');
                let animationFrameId;
                let angle = 0;

                const render = () => {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);
                    const centerX = canvas.width / 2;
                    const centerY = canvas.height / 2;
                    const currentScale = zoomActive ? 1.8 : 1.0;
                    angle += 0.005;

                    ctx.save();
                    ctx.translate(centerX, centerY);
                    ctx.scale(currentScale, currentScale);
                    ctx.rotate(angle * 0.2);

                    // Procedural Orbit Ring
                    ctx.strokeStyle = 'rgba(124, 58, 237, 0.2)';
                    ctx.lineWidth = 1;
                    ctx.beginPath();
                    ctx.arc(0, 0, 150, 0, Math.PI * 2);
                    ctx.stroke();

                    // Tech Nodes Matrix
                    ctx.fillStyle = '#7c3aed';
                    ctx.beginPath();
                    ctx.arc(-50, -30, 6, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.fillStyle = '#10b981';
                    ctx.beginPath();
                    ctx.arc(60, 40, 5, 0, Math.PI * 2);
                    ctx.fill();

                    ctx.restore();
                    animationFrameId = requestAnimationFrame(render);
                };

                const handleResize = () => {
                    canvas.width = canvas.parentElement?.clientWidth || window.innerWidth;
                    canvas.height = canvas.parentElement?.clientHeight || 500;
                };

                window.addEventListener('resize', handleResize);
                handleResize();
                render();

                return () => {
                    cancelAnimationFrame(animationFrameId);
                    window.removeEventListener('resize', handleResize);
                };
            }, [zoomActive]);

            return <canvas ref={canvasRef} class="w-full h-full opacity-60 ultra-smooth-motion" />;
        }

        function App() {
            const [activeTab, setActiveTab] = React.useState('hub'); 
            const [zoomPhase, setZoomPhase] = React.useState('idle'); 
            const [selectedCategory, setSelectedCategory] = React.useState('All');
            const [seoScore, setSeoScore] = React.useState(85);
            const [isOptimizing, setIsOptimizing] = React.useState(false);
            const [analyticsResult, setAnalyticsResult] = React.useState('');

            const triggerZoomSequence = () => {
                setZoomPhase('zooming');
                setTimeout(() => setZoomPhase('finished'), 1500);
            };

            return (
                <div class="min-h-screen relative">
                    <div class="absolute top-[-10%] left-[-15%] w-[500px] h-[500px] bg-violet-600/10 rounded-full neon-pulse-glow pointer-events-none" />
                    <div class="absolute bottom-[15%] right-[-10%] w-[500px] h-[500px] bg-emerald-600/5 rounded-full neon-pulse-glow pointer-events-none" />

                    {zoomPhase !== 'finished' && (
                        <div class={`h-screen flex flex-col justify-between p-6 transition-all duration-1000 ${zoomPhase === 'zooming' ? 'opacity-0 scale-105 pointer-events-none' : 'opacity-100'}`}>
                            <header class="flex justify-between items-center max-w-7xl w-full mx-auto z-10">
                                <div class="flex items-center gap-3">
                                    <div class="w-10 h-10 bg-gradient-to-tr from-violet-600 to-indigo-600 rounded-xl flex items-center justify-center shadow-lg border border-white/10">
                                        <span class="font-black text-xl text-white">ID</span>
                                    </div>
                                    <span class="font-extrabold tracking-wider text-white">PORTFOLIO.3D</span>
                                </div>
                            </header>

                            <div class="absolute inset-0 z-0">
                                <Workspace3DScene zoomActive={zoomPhase === 'zooming'} />
                            </div>

                            <div class="text-center max-w-2xl mx-auto space-y-6 z-10 pb-20">
                                <h1 class="text-4xl md:text-6xl font-black tracking-tight text-white">
                                    3D Workspace <br /><span class="text-gradient-shimmer">Interactive Hub</span>
                                </h1>
                                <p class="text-zinc-400 text-sm font-light">Double-click or click enter below to dive directly inside the interactive console dashboard.</p>
                                <button onClick={triggerZoomSequence} class="bg-white hover:bg-zinc-200 text-black font-extrabold px-8 py-3.5 rounded-xl transition-all shadow-xl text-xs uppercase tracking-wider inline-flex items-center gap-2">
                                    <Icon name="play" className="w-4 h-4" /> Enter Laptop Monitor View
                                </button>
                            </div>
                        </div>
                    )}

                    {zoomPhase === 'finished' && (
                        <div class="animate-fade-in">
                            <nav class="sticky top-0 z-50 bg-[#030304]/90 border-b border-zinc-800 backdrop-blur-md p-4">
                                <div class="max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4">
                                    <div class="flex items-center gap-2" onClick={() => setZoomPhase('idle')}>
                                        <div class="w-8 h-8 bg-violet-600 rounded-lg flex items-center justify-center text-white font-bold">ID</div>

                                    </div>

                                    <div class="flex bg-zinc-900 p-1 rounded-xl border border-zinc-800">
                                        {['hub', 'resume', 'sandbox', 'analytics'].map((t) => (
                                            <button key={t} onClick={() => setActiveTab(t)} class={`px-3 py-1.5 text-xs font-bold rounded-lg uppercase tracking-wider ${activeTab === t ? 'bg-zinc-800 text-white' : 'text-zinc-500'}`}>
                                                {t}
                                            </button>
                                        ))}
                                    </div>

                                    <button onClick={() => window.print()} class="bg-emerald-500 text-black font-bold px-4 py-1.5 rounded-lg text-xs flex items-center gap-1">
                                        <Icon name="printer" /> Print PDF
                                    </button>
                                </div>
                            </nav>

                            {activeTab === 'hub' && (
                                <div class="max-w-7xl mx-auto p-6 space-y-10">
                                    <div class="bg-zinc-900/40 border border-zinc-800 p-8 rounded-3xl space-y-4">
                                        <h1 class="text-3xl md:text-5xl font-black text-white">{RESUME_DATA.name}</h1>
                                        <p class="text-violet-400 font-bold uppercase tracking-widest text-sm">{RESUME_DATA.title} &bull; {RESUME_DATA.subTitle}</p>
                                        <p class="text-zinc-400 text-sm max-w-3xl leading-relaxed">{RESUME_DATA.summary}</p>
                                        
                                        <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 pt-4">
                                            <div class="bg-zinc-950 p-4 rounded-xl border border-zinc-900 text-xs">
                                                <span class="text-zinc-500 block font-mono">LOCATION</span>
                                                <span class="text-zinc-200">{RESUME_DATA.contact.location}</span>
                                            </div>
                                            <div class="bg-zinc-950 p-4 rounded-xl border border-zinc-900 text-xs">
                                                <span class="text-zinc-500 block font-mono">PHONE</span>
                                                <span class="text-zinc-200">{RESUME_DATA.contact.phone}</span>
                                            </div>
                                            <div class="bg-zinc-950 p-4 rounded-xl border border-zinc-900 text-xs">
                                                <span class="text-zinc-500 block font-mono">EMAIL</span>

                                            </div>
                                        </div>
                                    </div>

                                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

                                            <h3 class="text-lg font-bold text-white border-b border-zinc-800 pb-2">Skills & Competency</h3>
                                            <div class="space-y-3">
                                                {RESUME_DATA.skills.map((s, idx) => (
                                                    <div key={idx} class="space-y-1">

                                                            <span class="text-zinc-300">{s.name}</span>

                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        <div class="bg-zinc-950 p-6 rounded-2xl border border-zinc-900 space-y-6">
                                            <div class="space-y-3">
                                                <h3 class="text-lg font-bold text-white border-b border-zinc-800 pb-2">Projects Log</h3>
                                                {RESUME_DATA.projects.map((p, idx) => (
                                                    <div key={idx} class="text-xs space-y-1">
                                                        <p class="font-bold text-zinc-200">{p.title}</p>
                                                        <p class="text-[10px] text-zinc-500">{p.timeline} | {p.type}</p>
                                                    </div>
                                                ))}
                                            </div>

                                            <div class="space-y-3">
                                                <h3 class="text-lg font-bold text-white border-b border-zinc-800 pb-2">Education</h3>
                                                {RESUME_DATA.education.map((e, idx) => (
                                                    <div key={idx} class="text-xs">
                                                        <p class="font-bold text-zinc-200">{e.degree}</p>
                                                        <p class="text-zinc-500">{e.institution} ({e.timeline})</p>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {activeTab === 'resume' && (
                                <div class="max-w-4xl mx-auto p-6 bg-white text-zinc-900 rounded-2xl my-6 print-page">
                                    <div class="border-b-2 border-zinc-900 pb-4 flex justify-between items-start">
                                        <div>
                                            <h1 class="text-3xl font-black">{RESUME_DATA.name}</h1>
                                            <p class="text-sm font-bold text-violet-700 uppercase tracking-wide">{RESUME_DATA.title}</p>
                                        </div>
                                        <div class="text-right text-xs text-zinc-600 font-mono">
                                            <p>{RESUME_DATA.contact.location}</p>
                                            <p>{RESUME_DATA.contact.phone} | {RESUME_DATA.contact.email}</p>
                                        </div>
                                    </div>
                                    <div class="mt-6 space-y-4">
                                        <p class="text-sm leading-relaxed text-zinc-700">{RESUME_DATA.summary}</p>
                                        <div class="h-px bg-zinc-200" />
                                        <h3 class="text-sm font-bold uppercase text-zinc-400 font-mono">Project Scope</h3>
                                        {RESUME_DATA.projects.map((p, i) => (
                                            <div key={i} class="text-xs">
                                                <p class="font-bold text-zinc-900">{p.title} ({p.timeline})</p>
                                                <ul class="list-disc list-inside text-zinc-600 mt-1">{p.points.map((pt, idx) => <li key={idx}>{pt}</li>)}</ul>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {activeTab === 'sandbox' && (
                                <div class="max-w-3xl mx-auto p-6">
                                    <div class="bg-zinc-950 border border-zinc-900 p-8 rounded-2xl space-y-4">
                                        <h2 class="text-xl font-bold">SEO Optimizer Engine</h2>
                                        <div class="flex items-center gap-4 bg-zinc-900 p-4 rounded-xl">

                                            <p class="text-xs text-zinc-400">Current dynamic search optimization matrix score.</p>
                                        </div>
                                        <button onClick={() => { setSeoScore(100); }} class="w-full bg-violet-600 font-bold p-3 rounded-xl text-xs uppercase tracking-wider">
                                            Execute Script Optimization Array

                                    </div>
                                </div>
                            )}

                            {activeTab === 'analytics' && (
                                <div class="max-w-3xl mx-auto p-6">
                                    <div class="bg-zinc-950 border border-zinc-900 p-8 rounded-2xl space-y-4">

                                        <button onClick={() => setAnalyticsResult('Success: Analyzed competency metrics across 8 structural vectors. Average portfolio score generated: 92.4%')} class="bg-emerald-500 text-black font-bold px-6 py-2 rounded-xl text-xs uppercase tracking-wider">
                                            Compute Sheet Matrix Analytics
                                        </button>
                                        {analyticsResult && <pre class="bg-zinc-900 p-4 rounded-xl text-xs font-mono text-zinc-300 mt-2 whitespace-pre-wrap">{analyticsResult}</pre>}
                                    </div>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        const root = tragedies = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
